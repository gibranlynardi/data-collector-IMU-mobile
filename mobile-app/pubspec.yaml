name: sensors_app
description: "Wireless IMU Data Logger for Machine Learning"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  flutter_bluetooth_serial: ^0.4.0

  sensors_plus: ^5.0.1
  
  permission_handler: ^11.3.0
  
  path_provider: ^2.1.2

  sqflite: 2.3.3+1

  web_socket_channel: ^3.0.1

  connectivity_plus: ^6.0.5

  battery_plus: ^6.0.2

  uuid: ^4.5.1

  http: ^1.2.2

  shared_preferences: ^2.3.2
  
  csv: ^6.0.0
  
  intl: ^0.19.0
  wakelock_plus: ^1.2.8

  protobuf: 6.0.0
  fixnum: 1.1.0
  path: 1.9.1
  sqflite_common_ffi: 2.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true