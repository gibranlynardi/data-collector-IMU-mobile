pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropsFile = file("local.properties")
        if (localPropsFile.exists()) {
            localPropsFile.withInputStream { properties.load(it) }
        }
        def path = properties.getProperty("flutter.sdk")
        if (path == null || path.trim().isEmpty() || !new File(path.trim()).exists()) {
            // Fallback: locate flutter binary from PATH (used in CI)
            def isWindows = System.getProperty("os.name").toLowerCase().contains("windows")
            def cmd = isWindows ? ["cmd", "/c", "where flutter"] : ["which", "flutter"]
            def proc = cmd.execute()
            proc.waitFor()
            def lines = proc.text.trim().readLines()
            if (!lines.isEmpty()) {
                def flutterBin = lines.first().trim()
                if (flutterBin) {
                    path = new File(flutterBin).parentFile?.parentFile?.absolutePath
                }
            }
        }
        assert path != null && !path.trim().isEmpty(),
            "flutter.sdk not set in local.properties and flutter not found in PATH"
        return path
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.2.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false 
}

include ":app"
