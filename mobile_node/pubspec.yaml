name: sensors_app
description: "IMU Telemetry Mobile Node"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Sensor
  sensors_plus: ^5.0.1

  # Permissions & storage
  permission_handler: ^11.3.0
  path_provider: ^2.1.2

  # Network
  web_socket_channel: ^2.4.5

  # Protobuf
  protobuf: ^3.1.0

  # UUID for device_id
  uuid: ^4.4.0

  # Persistent storage
  shared_preferences: ^2.2.3

  # Foreground service (resilience §9.3)
  flutter_foreground_task: ^8.0.0

  # Battery level for preflight check
  battery_plus: ^5.0.3

  # Utilities
  intl: ^0.19.0

  # Legacy CSV logger (kept for file reference only, not imported by new code)
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true