syntax = "proto3";

package imu.collector.v1;

option java_multiple_files = true;
option java_package = "com.fams.imu.collector.v1";
option go_package = "imu/collector/v1;collectorv1";
option csharp_namespace = "Fams.Imu.Collector.V1";

enum ControlCommandType {
  CONTROL_COMMAND_TYPE_UNSPECIFIED = 0;
  START_SESSION = 1;
  STOP_SESSION = 2;
  SYNC_CLOCK = 3;
  SYNC_REQUIRED = 4;
  PING = 5;
  ACK = 6;
  CLOCK_SYNC_PONG = 7;
}

message ControlCommand {
  ControlCommandType command = 1;
  string session_id = 2;
  uint64 issued_at_server_unix_ns = 3;
  string schema_version = 4;

  // Optional command arguments.
  uint32 target_sampling_hz = 10;
  uint64 recording_start_seq = 11;
  uint64 server_start_time_unix_ns = 12;
  uint64 backend_last_seq = 13;
  string command_id = 14;
  bool ack = 15;
  uint64 device_unix_ns = 16;
  uint64 batch_start_seq = 17;
  uint64 batch_end_seq = 18;
  uint64 duplicate_batches = 19;
  bool duplicate = 20;
  string detail = 21;
}
